name: Supabase Keep-Alive

on:
  schedule:
    # Run every 24 hours at 08:00 UTC — keeps free-tier project from auto-pausing
    - cron: '0 8 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://dvhjvtxtkmtsqlnurhfg.supabase.co/rest/v1/entries?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Supabase returned $STATUS — project may be paused"
            exit 1
          fi
          echo "Project is active."
